name: Build macOS app

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if grep -qi "fr-core-news-lg" requirements.txt; then echo "ERROR: remove fr-core-news-lg from requirements.txt"; exit 1; fi
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy model
        run: |
          python -m spacy download fr_core_news_lg

      - name: Build app
        run: |
          pyinstaller --noconfirm --onefile --windowed --name anonymyseur --hidden-import fitz --collect-all pymupdf app_ctk.py

      - name: Package binary
        run: |
          ditto -c -k --sequesterRsrc dist/anonymyseur dist/anonymyseur-macos-onefile.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anonymyseur-macos
          path: dist/anonymyseur-macos-onefile.zip
