name: Build macOS app

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          pyinstaller --noconfirm --windowed --name anonymyseur --hidden-import fitz --collect-all pymupdf app_ctk.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anonymyseur-macos
          path: dist/anonymyseur.app
