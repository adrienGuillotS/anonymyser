name: Build Windows MSIX

on:
  workflow_dispatch:
  push:
    tags:
      - "msix-v*.*.*"

jobs:
  build-windows-msix:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe (PyInstaller)
        run: |
          pyinstaller --noconfirm --onefile --name anonymyseur app_gui.py

      - name: Prepare MSIX layout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path msix\Assets | Out-Null
          Copy-Item -Force packaging\windows\AppxManifest.xml msix\AppxManifest.xml
          Copy-Item -Force dist\anonymyseur.exe msix\anonymyseur.exe

      - name: Generate placeholder assets
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          function New-Png($path, $w, $h) {
            $bmp = New-Object System.Drawing.Bitmap($w, $h)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(11,18,32))
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(79,70,229))
            $g.FillRectangle($brush, 0, 0, $w, $h)
            $brush.Dispose()
            $g.Dispose()
            $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
          }
          New-Png "msix\\Assets\\Square44x44Logo.png" 44 44
          New-Png "msix\\Assets\\Square150x150Logo.png" 150 150
          New-Png "msix\\Assets\\StoreLogo.png" 50 50

      - name: Create self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Anonymyser" -KeyUsage DigitalSignature -CertStoreLocation "Cert:\\CurrentUser\\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
          $pwd = ConvertTo-SecureString -String "password" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath signingCert.pfx -Password $pwd | Out-Null

      - name: Pack MSIX
        shell: pwsh
        run: |
          # MakeAppx is available on windows-latest runners.
          MakeAppx pack /d msix /p anonymyseur.msix /o

      - name: Sign MSIX
        shell: pwsh
        run: |
          $pwd = ConvertTo-SecureString -String "password" -Force -AsPlainText
          # Use signtool from Windows SDK.
          signtool sign /fd SHA256 /f signingCert.pfx /p password anonymyseur.msix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anonymyseur-msix
          path: anonymyseur.msix
