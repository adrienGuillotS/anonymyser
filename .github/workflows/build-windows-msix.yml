name: Build Windows MSIX

on:
  workflow_dispatch:
  push:
    tags:
      - "msix-v*.*.*"

jobs:
  build-windows-msix:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe (PyInstaller)
        run: |
          pyinstaller --noconfirm --onefile --name anonymyseur app_gui.py

      - name: Prepare MSIX layout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path msix\Assets | Out-Null
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <Package
            xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
            xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
            xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
            IgnorableNamespaces="uap rescap">

            <Identity
              Name="AdrienGuillotS.Anonymyser"
              Publisher="CN=Anonymyser"
              Version="1.0.0.0" />

            <Properties>
              <DisplayName>Anonymyser</DisplayName>
              <PublisherDisplayName>Anonymyser</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>

            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
            </Dependencies>

            <Resources>
              <Resource Language="en-us" />
            </Resources>

            <Applications>
              <Application Id="App" Executable="anonymyseur.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements
                  DisplayName="Anonymyser"
                  Description="Anonymyser"
                  BackgroundColor="#0B1220"
                  Square150x150Logo="Assets\Square150x150Logo.png"
                  Square44x44Logo="Assets\Square44x44Logo.png" />
              </Application>
            </Applications>

            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>

          </Package>
          '@ | Out-File -Encoding utf8 msix\AppxManifest.xml
          Copy-Item -Force dist\anonymyseur.exe msix\anonymyseur.exe

      - name: Generate placeholder assets
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          function New-Png($path, $w, $h) {
            $bmp = New-Object System.Drawing.Bitmap($w, $h)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(11,18,32))
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(79,70,229))
            $g.FillRectangle($brush, 0, 0, $w, $h)
            $brush.Dispose()
            $g.Dispose()
            $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
          }
          New-Png "msix\\Assets\\Square44x44Logo.png" 44 44
          New-Png "msix\\Assets\\Square150x150Logo.png" 150 150
          New-Png "msix\\Assets\\StoreLogo.png" 50 50

      - name: Create self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Anonymyser" -KeyUsage DigitalSignature -CertStoreLocation "Cert:\\CurrentUser\\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
          $pwd = ConvertTo-SecureString -String "password" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath signingCert.pfx -Password $pwd | Out-Null

      - name: Pack MSIX
        shell: pwsh
        run: |
          function Get-MakeAppxPath {
            $candidate = Get-ChildItem -Path "C:\\Program Files (x86)\\Windows Kits\\10" -Recurse -Filter makeappx.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { return $candidate.FullName }

            if (-not (Test-Path "sdktools")) {
              New-Item -ItemType Directory -Force -Path sdktools | Out-Null
            }

            if (-not (Test-Path "sdktools\\nuget.exe")) {
              $ProgressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile "sdktools\\nuget.exe" | Out-Null
            }

            $null = & "sdktools\\nuget.exe" install Microsoft.Windows.SDK.BuildTools -OutputDirectory sdktools -NonInteractive

            $candidate = Get-ChildItem -Path "sdktools" -Recurse -Filter makeappx.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { return $candidate.FullName }

            # Final fallback: install Windows 10 SDK via Chocolatey
            if (Get-Command choco -ErrorAction SilentlyContinue) {
              choco install windows-sdk-10.0 -y --no-progress | Out-Null
              $candidate = Get-ChildItem -Path "C:\\Program Files (x86)\\Windows Kits\\10" -Recurse -Filter makeappx.exe -ErrorAction SilentlyContinue |
                Sort-Object FullName -Descending |
                Select-Object -First 1
              if ($candidate) { return $candidate.FullName }
            }

            return $null
          }

          $makeappxPath = Get-MakeAppxPath
          if (-not $makeappxPath) {
            throw "makeappx.exe not found on runner (Windows Kits missing and NuGet fallback failed)"
          }

          & $makeappxPath pack /d msix /p anonymyseur.msix /o

      - name: Sign MSIX
        shell: pwsh
        run: |
          $pwd = ConvertTo-SecureString -String "password" -Force -AsPlainText
          function Get-SignToolPath {
            $candidate = Get-ChildItem -Path "C:\\Program Files (x86)\\Windows Kits\\10" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { return $candidate.FullName }

            if (-not (Test-Path "sdktools")) {
              New-Item -ItemType Directory -Force -Path sdktools | Out-Null
            }

            if (-not (Test-Path "sdktools\\nuget.exe")) {
              $ProgressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile "sdktools\\nuget.exe" | Out-Null
            }

            $null = & "sdktools\\nuget.exe" install Microsoft.Windows.SDK.BuildTools -OutputDirectory sdktools -NonInteractive

            $candidate = Get-ChildItem -Path "sdktools" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { return $candidate.FullName }

            # Final fallback: install Windows 10 SDK via Chocolatey
            if (Get-Command choco -ErrorAction SilentlyContinue) {
              choco install windows-sdk-10.0 -y --no-progress | Out-Null
              $candidate = Get-ChildItem -Path "C:\\Program Files (x86)\\Windows Kits\\10" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                Sort-Object FullName -Descending |
                Select-Object -First 1
              if ($candidate) { return $candidate.FullName }
            }

            return $null
          }

          $signtoolPath = Get-SignToolPath
          if (-not $signtoolPath) {
            throw "signtool.exe not found on runner (Windows Kits missing and NuGet fallback failed)"
          }

          & $signtoolPath sign /fd SHA256 /f signingCert.pfx /p password anonymyseur.msix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anonymyseur-msix
          path: anonymyseur.msix
